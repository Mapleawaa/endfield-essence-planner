<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>复刻时间轴 · Demo</title>
<style>
/* ===== Design Tokens (Lovable-inspired) ===== */
:root {
  --cream: #f7f4ed;
  --charcoal: #1c1c1c;
  --charcoal-rgb: 28, 28, 28;
  --muted: #5f5f5d;
  --border-passive: #eceae4;
  --grid-line: rgba(28, 28, 28, 0.06);
  --grid-line-strong: rgba(28, 28, 28, 0.1);
  --today-stroke: rgba(28, 28, 28, 0.24);
  --surface-hover: rgba(28, 28, 28, 0.025);
  --surface-press: rgba(28, 28, 28, 0.05);
  --focus-ring: 0 0 0 2px rgba(28, 28, 28, 0.1);
  --radius-sm: 5px;
  --radius-md: 8px;
  --radius-lg: 14px;
  --font-stack: "Inter", ui-sans-serif, system-ui, -apple-system, sans-serif;

  /* Bar color system */
  --bar-past-fill: rgba(28, 28, 28, 0.08);
  --bar-past-stroke: rgba(28, 28, 28, 0.15);
  --bar-past-label: rgba(28, 28, 28, 0.5);
  --bar-active-fill: rgba(28, 28, 28, 0.86);
  --bar-active-label: #fcfbf8;
  --bar-upcoming-fill: rgba(28, 28, 28, 0.03);
  --bar-upcoming-stroke: rgba(28, 28, 28, 0.1);
  --bar-upcoming-label: rgba(28, 28, 28, 0.4);

  /* Layout */
  --left-col-w: 172px;
  --left-col-w-mobile: 50px;
  --row-h: 52px;
  --bar-h: 24px;
  --header-h: 44px;
  --px-per-day: 5.2;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font-stack);
  background: var(--cream);
  color: var(--charcoal);
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
}

/* ===== Shell ===== */
.demo-shell {
  max-width: 1160px;
  margin: 0 auto;
  padding: 36px 28px 56px;
}

.demo-hd {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 20px;
}
.demo-hd h1 {
  font-size: 26px;
  font-weight: 600;
  letter-spacing: -0.5px;
}
.demo-hd .pill {
  font-size: 12px;
  color: var(--muted);
  background: var(--surface-press);
  padding: 3px 10px;
  border-radius: 999px;
  letter-spacing: 0.03em;
  user-select: none;
}

/* ===== Card ===== */
.tl-card {
  border: 1px solid var(--border-passive);
  border-radius: var(--radius-lg);
  overflow: hidden;
  background: var(--cream);
}

/* ===== Legend Strip ===== */
.tl-legend {
  display: flex;
  gap: 22px;
  padding: 12px 18px;
  border-bottom: 1px solid var(--border-passive);
  flex-wrap: wrap;
}
.tl-legend .item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 11.5px;
  color: var(--muted);
  letter-spacing: 0.02em;
}
.tl-legend .dot {
  width: 9px;
  height: 9px;
  border-radius: 2.5px;
  flex-shrink: 0;
}
.dot.past    { background: var(--bar-past-fill); border: 1px solid var(--bar-past-stroke); }
.dot.active  { background: var(--bar-active-fill); }
.dot.upcoming { background: var(--bar-upcoming-fill); border: 1px dashed var(--bar-upcoming-stroke); }

/* ===== Body ===== */
.tl-body {
  display: flex;
}

/* ===== Left Panel ===== */
.tl-left {
  width: var(--left-col-w);
  flex-shrink: 0;
  border-right: 1px solid var(--border-passive);
  background: var(--cream);
  z-index: 3;
}
.tl-left-hd {
  height: var(--header-h);
  display: flex;
  align-items: center;
  padding: 0 16px;
  font-size: 11px;
  font-weight: 600;
  color: var(--muted);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  border-bottom: 1px solid var(--border-passive);
  user-select: none;
}
.tl-left-row {
  height: var(--row-h);
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 0 14px;
  border-bottom: 1px solid rgba(28,28,28,0.035);
  transition: background 0.12s ease;
}
.tl-left-row:hover { background: var(--surface-hover); }
.tl-left-row .av {
  width: 32px;
  height: 32px;
  border-radius: 7px;
  object-fit: cover;
  flex-shrink: 0;
  background: var(--surface-press);
  border: 1px solid rgba(28,28,28,0.05);
}
.tl-left-row .av-fb {
  width: 32px;
  height: 32px;
  border-radius: 7px;
  flex-shrink: 0;
  background: var(--surface-press);
  border: 1px solid rgba(28,28,28,0.05);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  font-weight: 600;
  color: var(--muted);
}
.tl-left-row .nm {
  font-size: 13.5px;
  font-weight: 500;
  color: var(--charcoal);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  letter-spacing: 0.01em;
}

/* ===== Right Panel ===== */
.tl-right {
  flex: 1 1 auto;
  overflow-x: auto;
  overflow-y: hidden;
  position: relative;
  scroll-behavior: smooth;
}
.tl-right::-webkit-scrollbar { height: 5px; }
.tl-right::-webkit-scrollbar-track { background: transparent; }
.tl-right::-webkit-scrollbar-thumb {
  background: rgba(28,28,28,0.1);
  border-radius: 999px;
}
.tl-right::-webkit-scrollbar-thumb:hover { background: rgba(28,28,28,0.2); }

/* ===== Canvas ===== */
.tl-canvas {
  position: relative;
}
.tl-canvas .tl-header {
  height: var(--header-h);
  display: flex;
  border-bottom: 1px solid var(--border-passive);
  position: sticky;
  top: 0;
  background: var(--cream);
  z-index: 2;
}
.tl-canvas .mo-cell {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12.5px;
  font-weight: 500;
  color: var(--muted);
  letter-spacing: 0.02em;
  border-right: 1px solid var(--grid-line);
  user-select: none;
}

/* ===== Row ===== */
.tl-row {
  height: var(--row-h);
  display: flex;
  position: relative;
  border-bottom: 1px solid rgba(28,28,28,0.035);
}
.tl-row .mo-bg {
  flex-shrink: 0;
  height: 100%;
  border-right: 1px solid var(--grid-line);
}

/* Alternating subtle row tint */
.tl-row:nth-child(even) { background: rgba(28,28,28,0.008); }

/* ===== Window Bar ===== */
.win-bar {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  height: var(--bar-h);
  border-radius: var(--radius-sm);
  display: flex;
  align-items: center;
  padding: 0 9px;
  font-size: 10.5px;
  font-weight: 500;
  letter-spacing: 0.02em;
  white-space: nowrap;
  cursor: default;
  transition: box-shadow 0.12s ease, filter 0.12s ease;
  z-index: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  user-select: none;
}
.win-bar:hover {
  box-shadow: var(--focus-ring);
  filter: brightness(0.96);
  z-index: 4;
}
.win-bar.past {
  background: var(--bar-past-fill);
  border: 1px solid var(--bar-past-stroke);
  color: var(--bar-past-label);
}
.win-bar.active {
  background: var(--bar-active-fill);
  color: var(--bar-active-label);
}
.win-bar.upcoming {
  background: var(--bar-upcoming-fill);
  border: 1px dashed var(--bar-upcoming-stroke);
  color: var(--bar-upcoming-label);
}

/* ===== Today Line (single overlay) ===== */
.tl-today {
  position: absolute;
  top: 0;
  width: 1px;
  background: var(--today-stroke);
  z-index: 2;
  pointer-events: none;
}
.tl-today .lbl {
  position: absolute;
  top: -23px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 9.5px;
  font-weight: 600;
  color: var(--charcoal);
  letter-spacing: 0.04em;
  white-space: nowrap;
  background: var(--cream);
  padding: 1px 6px;
  border-radius: 3px;
  border: 1px solid var(--today-stroke);
  line-height: 1.5;
}

/* ===== Tooltip ===== */
.tl-tt {
  position: fixed;
  pointer-events: none;
  opacity: 0;
  background: var(--charcoal);
  color: #fcfbf8;
  padding: 7px 11px;
  border-radius: var(--radius-sm);
  font-size: 11.5px;
  line-height: 1.5;
  letter-spacing: 0.02em;
  z-index: 100;
  transition: opacity 0.1s ease;
  white-space: nowrap;
  box-shadow: 0 4px 18px rgba(0,0,0,0.13);
}
.tl-tt.on { opacity: 1; }
.tl-tt .tt-name { font-weight: 600; margin-bottom: 1px; }
.tl-tt .tt-meta { color: rgba(255,255,255,0.6); font-size: 11px; }

/* ===== Empty ===== */
.tl-empty {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 48px 24px;
  color: var(--muted);
  font-size: 13.5px;
  letter-spacing: 0.02em;
  border: 1px dashed rgba(28,28,28,0.1);
  border-radius: var(--radius-md);
  margin: 20px;
}

/* ===== Mobile ===== */
@media (max-width: 700px) {
  .demo-shell { padding: 20px 10px 40px; }
  .demo-hd { margin-bottom: 14px; }
  .demo-hd h1 { font-size: 20px; letter-spacing: -0.3px; }
  .tl-left { width: var(--left-col-w-mobile); }
  .tl-left-hd { padding: 0 4px; font-size: 9px; justify-content: center; }
  .tl-left-row { padding: 0 6px; justify-content: center; gap: 0; }
  .tl-left-row .nm { display: none; }
  .tl-left-row .av, .tl-left-row .av-fb { width: 28px; height: 28px; border-radius: 6px; }
  :root {
    --row-h: 46px;
    --bar-h: 20px;
    --header-h: 38px;
  }
  .win-bar { font-size: 9.5px; padding: 0 6px; }
  .tl-legend { padding: 8px 12px; gap: 14px; }
  .tl-legend .item { font-size: 10.5px; }
}
</style>
</head>
<body>

<div class="demo-shell">
  <div class="demo-hd">
    <h1>复刻时间轴</h1>
    <span class="pill">Demo · 甘特图</span>
  </div>
  <div class="tl-card">
    <div class="tl-legend">
      <span class="item"><span class="dot past"></span>已结束</span>
      <span class="item"><span class="dot active"></span>正在进行</span>
      <span class="item"><span class="dot upcoming"></span>即将到来</span>
    </div>
    <div class="tl-body" id="tlBody"></div>
  </div>
</div>

<div class="tl-tt" id="tlTt"></div>

<script>
(function () {
  const DAY_MS = 86400000;
  const PX_PER_DAY = 5.2;

  // ---- Data ----
  const RAW = {
    '莱万汀':   { windows: [{ s:'2026-01-22T12:00+08:00', e:'2026-02-07T12:00+08:00' },{ s:'2026-05-14T12:00+08:00', e:'2026-06-05T12:00+08:00' }] },
    '洁尔佩塔': { windows: [{ s:'2026-02-07T12:00+08:00', e:'2026-02-24T12:00+08:00' },{ s:'2026-05-14T12:00+08:00', e:'2026-06-05T12:00+08:00' }] },
    '伊冯':     { windows: [{ s:'2026-02-24T12:00+08:00', e:'2026-03-12T12:00+08:00' }] },
    '汤汤':     { windows: [{ s:'2026-03-12T12:00+08:00', e:'2026-03-29T12:00+08:00' }] },
    '洛茜':     { windows: [{ s:'2026-03-29T12:00+08:00', e:'2026-04-17T12:00+08:00' }] },
    '庄方宜':   { windows: [{ s:'2026-04-17T12:00+08:00', e:'2026-05-22T12:00+08:00' }] }
  };

  // ---- Process data ----
  const nowMs = Date.now();
  const chars = [];
  let gMin = Infinity, gMax = -Infinity;

  Object.keys(RAW).forEach(name => {
    const wins = RAW[name].windows.map(w => ({
      startMs: new Date(w.s).getTime(),
      endMs:   new Date(w.e).getTime()
    })).sort((a,b) => a.startMs - b.startMs);
    wins.forEach(w => { if(w.startMs < gMin) gMin = w.startMs; if(w.endMs > gMax) gMax = w.endMs; });
    chars.push({ name, avatar: `./image/characters/${name}.avif`, wins });
  });

  // Sort by first window appearance
  chars.sort((a,b) => a.wins[0].startMs - b.wins[0].startMs);

  // Timeline range: 1st of the month of first window -> 1st of 2 months after last window
  const rStart = new Date(gMin); rStart.setDate(1); rStart.setHours(0,0,0,0);
  const rEnd   = new Date(gMax); rEnd.setMonth(rEnd.getMonth() + 2); rEnd.setDate(1); rEnd.setHours(0,0,0,0);
  const rStartMs = rStart.getTime();
  const rEndMs   = rEnd.getTime();
  const totalDays = Math.ceil((rEndMs - rStartMs) / DAY_MS);
  const canvasW = totalDays * PX_PER_DAY;

  // Month columns
  const months = [];
  const cur = new Date(rStart);
  while (cur < rEnd) {
    const nxt = new Date(cur); nxt.setMonth(nxt.getMonth() + 1);
    const mEnd = Math.min(nxt.getTime(), rEndMs);
    const days = Math.ceil((mEnd - cur.getTime()) / DAY_MS);
    months.push({
      label: `${cur.getFullYear()}年${cur.getMonth()+1}月`,
      w: Math.round(days * PX_PER_DAY)
    });
    cur.setMonth(cur.getMonth() + 1);
  }

  // Helpers
  const px = (ms) => ((ms - rStartMs) / DAY_MS) * PX_PER_DAY;
  const fmt = (ms) => { const d = new Date(ms); return `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}`; };
  const barCls = (s, e) => nowMs >= s && nowMs <= e ? 'active' : (nowMs > e ? 'past' : 'upcoming');
  const barType = (s, e) => nowMs >= s && nowMs <= e ? '正在进行' : (nowMs > e ? '已结束' : '即将到来');

  const showToday = nowMs >= rStartMs && nowMs <= rEndMs;
  const todayPx = showToday ? px(nowMs) : null;

  // ---- Render ----
  const body = document.getElementById('tlBody');
  if (!chars.length) { body.innerHTML = '<div class="tl-empty">暂无复刻排行数据</div>'; return; }

  // Month headers
  const hdrCells = months.map(m => `<div class="mo-cell" style="width:${m.w}px">${m.label}</div>`).join('');

  // Left panel rows
  const leftRows = chars.map(c => {
    const av = c.avatar
      ? `<img class="av" src="${c.avatar}" alt="${c.name}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><div class="av-fb" style="display:none">${c.name[0]}</div>`
      : `<div class="av-fb">${c.name[0]}</div>`;
    return `<div class="tl-left-row">${av}<span class="nm">${c.name}</span></div>`;
  }).join('');

  // Timeline rows
  const tlRows = chars.map(c => {
    const bgCells = months.map(m => `<div class="mo-bg" style="width:${m.w}px"></div>`).join('');
    const bars = c.wins.map(w => {
      const l = px(w.startMs);
      const wd = Math.max(px(w.endMs) - l, 4);
      const cls = barCls(w.startMs, w.endMs);
      const label = `${fmt(w.startMs)} – ${fmt(w.endMs)}`;
      const showLabel = wd > 60;
      return `<div class="win-bar ${cls}" style="left:${l}px;width:${wd}px"
        data-name="${c.name}" data-dates="${label}" data-type="${barType(w.startMs, w.endMs)}"
      >${showLabel ? label : ''}</div>`;
    }).join('');
    return `<div class="tl-row">${bgCells}${bars}</div>`;
  }).join('');

  // Today line
  const todayHTML = showToday
    ? `<div class="tl-today" style="left:${todayPx}px;height:${chars.length * parseInt(getComputedStyle(document.documentElement).getPropertyValue('--row-h')) + parseInt(getComputedStyle(document.documentElement).getPropertyValue('--header-h'))}px"><span class="lbl">今天</span></div>`
    : '';

  body.innerHTML = `
    <div class="tl-left">
      <div class="tl-left-hd">角色</div>
      ${leftRows}
    </div>
    <div class="tl-right" id="tlRight">
      <div class="tl-canvas" style="width:${canvasW}px">
        <div class="tl-header">${hdrCells}</div>
        <div style="position:relative">${tlRows}${todayHTML}</div>
      </div>
    </div>
  `;

  // Auto-scroll to today
  if (showToday) {
    requestAnimationFrame(() => {
      const right = document.getElementById('tlRight');
      const target = todayPx - right.clientWidth / 3;
      right.scrollLeft = Math.max(0, target);
    });
  }

  // ---- Tooltip ----
  const tt = document.getElementById('tlTt');
  body.querySelectorAll('.win-bar').forEach(bar => {
    bar.addEventListener('mouseenter', () => {
      tt.innerHTML = `<div class="tt-name">${bar.dataset.name}</div><div class="tt-meta">${bar.dataset.type} · ${bar.dataset.dates}</div>`;
      tt.classList.add('on');
    });
    bar.addEventListener('mousemove', (e) => {
      tt.style.left = (e.clientX + 14) + 'px';
      tt.style.top  = (e.clientY - 42) + 'px';
    });
    bar.addEventListener('mouseleave', () => tt.classList.remove('on'));
  });
})();
</script>

</body>
</html>
